version: '3.8'

services:
  turtlebot_drl:
    build: 
      context: ./docker
      dockerfile: Dockerfile
    container_name: turtlebot_drl_container
    network_mode: "host"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - TURTLEBOT3_MODEL=burger
    volumes:
      # Mounts the local src directory into the container's catkin_ws
      - ./src:/root/catkin_ws/src
      # Allows Gazebo GUI to forward to the host machine
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    stdin_open: true
    tty: true
    command: bash -c "catkin_make && roslaunch turtlebot3_smart_nav start_rl_agent.launch"
